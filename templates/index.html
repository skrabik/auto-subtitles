<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Local Reel Generator</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main class="page">
      <section class="card">
        <header class="header">
          <div>
            <p class="eyebrow">Localhost only</p>
            <h1>Reel Generator</h1>
          </div>
          <p class="description">Vertical 1080x1920 video with automatic subtitles.</p>
        </header>

        {% if error %}
          <div class="message error">{{ error }}</div>
        {% endif %}

        {% if result %}
          <div class="message success">
            Video is ready:
            <a href="{{ result.download_url }}">download {{ result.filename }}</a>
          </div>
        {% endif %}

        <form action="/generate" method="post" enctype="multipart/form-data" class="form">
          <div class="top-row">
            <label class="field file-field">
              <span>Video file</span>
              <input type="file" name="video" accept="video/*" required>
            </label>

            <label class="field">
              <span>Language</span>
              <input type="text" name="language" value="ru" placeholder="ru, en, or empty for auto">
            </label>
          </div>

          <div class="grid system-grid">
            <label class="field">
              <span>Model</span>
              <select name="model">
                <option value="tiny">tiny</option>
                <option value="base">base</option>
                <option value="small" selected>small</option>
                <option value="medium">medium</option>
                <option value="large-v3">large-v3</option>
              </select>
            </label>

            <label class="field">
              <span>Device</span>
              <select name="device">
                <option value="cpu" selected>cpu</option>
                <option value="cuda">cuda</option>
                <option value="auto">auto</option>
              </select>
            </label>

            <label class="field">
              <span>Compute</span>
              <input type="text" name="compute_type" value="int8">
            </label>
          </div>

          <div class="grid subtitle-grid">
            <label class="field">
              <span>Words</span>
              <input type="number" name="max_words" value="2" min="1" max="8">
            </label>

            <label class="field">
              <span>Font size</span>
              <input type="number" name="font_size" value="114" min="24" max="220">
            </label>

            <label class="field">
              <span>Y offset</span>
              <input type="number" name="subtitle_y" value="370" min="0" max="900">
            </label>

            <label class="field">
              <span>Outline</span>
              <input type="number" name="outline" value="3" min="0" max="20">
            </label>

            <label class="field">
              <span>Shadow</span>
              <input type="number" name="shadow" value="1" min="0" max="20">
            </label>
          </div>

          <div class="action-row">
            <button type="submit">Generate video</button>
            <p class="hint">Processing can take a few minutes. Keep this tab open.</p>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
